apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      containers:
        - name: notifications
          image: {{ .Values.image.notifications }}
          ports:
            - containerPort: {{ .Values.ports.notifications }}
          env:
            - name: NODE_ID
              value: {{ .Values.node.id | quote }}
            - name: NODE_NAME
              value: {{ .Values.node.name | quote }}
            - name: PORT
              value: "{{ .Values.ports.notifications }}"
          volumeMounts:
            - name: fabric-config
              mountPath: /config/fabric.yaml
              subPath: fabric.yaml
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ports.notifications }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ports.notifications }}
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: fabric-config
          secret:
            secretName: fabric-config
